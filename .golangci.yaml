version: "2"
linters:
  default: none
  # Linters below mirror the legacy golangci-lint invocation.
  # Mappings from the old (removed/renamed) linters:
  #   golint                              -> revive
  #   varcheck/deadcode/structcheck       -> unused
  #   megacheck                           -> staticcheck (+ unused)
  #   interfacer                          -> removed in v2, no replacement
  #   maligned                            -> removed in v2 (see govet fieldalignment)
  #   typecheck                           -> always on, not configurable
  #   gofmt/goimports                     -> moved to `formatters` (see below)
  enable:
    - errcheck
    - gocritic
    - goconst
    - gosec
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused
    # Additional linters (not part of the legacy invocation) - enable as needed:
    # - asciicheck
    # - bodyclose
    # - depguard
    # - goprintffuncname
    # - nakedret
    # - rowserrcheck
    # Legacy linters with no v2 equivalent (cannot be enabled):
    # - interfacer  # removed in v2
    # - maligned    # removed in v2; use govet's fieldalignment instead
  settings:
    depguard:
      rules:
        Main:
          list-mode: lax
          deny:
            - pkg: github.com/sirupsen/logrus
              desc: logging is allowed only by jenkins-x/jx-logging
            - pkg: github.com/jenkins-x/jx/
              desc: you should not directly import jx
            - pkg: github.com/jenkins-x/jx/
              desc: you should not directly import jx v2
    dupl:
      threshold: 100
    exhaustive:
      default-signifies-exhaustive: false
    funlen:
      lines: 200
      statements: 150
    goconst:
      min-len: 3
      min-occurrences: 3
    gocritic:
      disabled-checks:
        - dupImport
        - ifElseChain
        - octalLiteral
        - whyNoLint
        - wrapperFunc
        - importShadow
        - unnamedResult
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
    gocyclo:
      min-complexity: 15
    govet:
      settings:
        printf:
          funcs:
            - (github.com/jenkins-x/jx-logging/v3/pkg/log/Logger()).Debugf
            - (github.com/jenkins-x/jx-logging/v3/pkg/log/Logger()).Infof
            - (github.com/jenkins-x/jx-logging/v3/pkg/log/Logger()).Warnf
            - (github.com/jenkins-x/jx-logging/v3/pkg/log/Logger()).Errorf
            - (github.com/jenkins-x/jx-logging/v3/pkg/log/Logger()).Fatalf
    lll:
      line-length: 140
    mnd:
      checks:
        - argument
        - case
        - condition
        - return
    nolintlint:
      require-explanation: false
      require-specific: false
      allow-unused: false
    revive:
      confidence: 0
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - revive
        path: _test\.go
      - linters:
          - testpackage
        path: _expansion_test\.go
      - linters:
          - gocritic
        text: 'evalOrder:'
    paths:
      - third_party$
      - builtin$
      - examples$
      - vendor$
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
      - vendor$
run:
  build-tags:
    - build
  timeout: 15m
